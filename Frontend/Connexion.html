<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - SMICA</title>
</head>
<body>

    <div class="top-header">
        <img src="smica.png" alt="Logo SMICA" class="logo-image">
    </div>

    <main class="main-container">
        <div class="login-card">
            <h1>Connexion</h1>
            <form>
                <div class="input-group">
                    <label for="username">Identifiant</label>
                    <input type="text" id="username" name="username">
                </div>
                <div class="input-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password">
                </div>
                <div class="form-footer">
                    <button type="submit" class="btn-orange">Valider</button>
                </div>
            </form>
        </div>

        <div class="help-card">
            <p>Besoin d'aide ou mot<br>de passe oublié ?<br>Contactez le support<br>technique.</p>
        </div>
    </main>

    <footer>
        © 2026 Groupe GTB - Tous droits réservés
    </footer>
<script src="app.js"></script>
</body>
</html>
