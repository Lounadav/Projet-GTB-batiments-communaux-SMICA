<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Authentification - SMICA</title>
    <style>
        :root { --primary-orange: #b85b31; --bg-white: #ffffff; --bg-dark: #635762; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
        }

        /* LOGO HAUT DROITE */
        .top-header { position: absolute; top: 25px; right: 25px; }
        .logo-image {
            width: 130px; border-radius: 15px;
            background-color: white; padding: 10px 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .auth-container {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 800px; gap: 25px; margin-top: 60px;
        }

        .title-card {
            background-color: var(--bg-white); padding: 15px 50px;
            border-radius: 50px; text-align: center;
        }
        .title-card h1 { color: var(--primary-orange); font-size: 2rem; }

        .auth-card {
            background-color: var(--bg-white); padding: 50px 40px;
            border-radius: 40px; width: 100%; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .code-inputs { display: flex; justify-content: center; gap: 15px; margin-bottom: 35px; }
        .code-box {
            width: 65px; height: 85px; border: 2px solid var(--primary-orange);
            border-radius: 10px; font-size: 2.5rem; text-align: center;
            color: var(--primary-orange); outline: none;
        }

        .btn-orange {
            background-color: var(--primary-orange); color: white;
            border: none; padding: 14px 45px; font-size: 1.1rem;
            font-weight: 600; border-radius: 30px; cursor: pointer;
        }

        footer { margin-top: auto; padding: 20px; color: white; font-size: 0.9rem; }

        @media (max-width: 600px) {
            .logo-image { width: 100px; }
            .title-card h1 { font-size: 1.3rem; }
            .code-box { width: 42px; height: 55px; font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <header class="top-header">
        <img src="smica.png" alt="Logo SMICA" class="logo-image">
    </header>

    <main class="auth-container">
        <div class="title-card"><h1>Double Authentification</h1></div>

        <div class="auth-card">
            <div class="code-inputs">
                <input type="text" maxlength="1" class="code-box">
                <input type="text" maxlength="1" class="code-box">
                <input type="text" maxlength="1" class="code-box">
                <input type="text" maxlength="1" class="code-box">
                <input type="text" maxlength="1" class="code-box">
                <input type="text" maxlength="1" class="code-box">
            </div>
            <div class="auth-text">
                <p style="color: #b85b31; font-weight: 600; margin-bottom: 20px;">
                   Vérifiez votre messagerie : un code unique vous a été envoyé.<br> 
                Vous ne le trouvez pas ? Pensez à vérifier vos courriers indésirables (spams).
                </p>
            </div>
            <button type="submit" class="btn-orange">Envoyer</button>
        </div>
    </main>

    <footer>© 2026 Groupe GTB - Tous droits réservés</footer>
<script src="app.js"></script>
</body>
</html>
