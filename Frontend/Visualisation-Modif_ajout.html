<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualisation et Ajout</title>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="pill user-profile">
                <div class="avatar"></div>
                <div class="greeting">Bonjour , &lt;User&gt;</div>
                <div class="logout-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </div>
            </div>

            <div class="pill main-title">
                Visualisation et Ajout
            </div>

                <img src="smica.png" alt="Logo SMICA" class="logo-image">
        </header>

        <main>
            <div class="top-row">
                <div class="widget-dark">
                    <h3>Température</h3>
                    <div class="temp-content">
                        <span class="temp-val">????? °C</span>
                        <span class="temp-target">???</span>
                    </div>
                </div>

                <div class="chauffage-widget">
                    <h3>Chauffage</h3>
                    <div class="toggle-switch">
                        <div class="toggle-knob"></div>
                    </div>
                </div>

                <div class="widget-dark">
                    <h3>Qualité de l'air</h3>
                    <div class="air-val">????? µg/m³</div>
                </div>
            </div>

            <div class="bottom-row">
                <div class="chart-box"></div>
                
                <div class="action-buttons">
                    <button class="btn-action">Ajouter un batiment</button>
                    <button class="btn-action">Ajouter un capteur</button>
                </div>
            </div>
        </main>

        <footer>
            © 2026 Groupe GTB - Tous droits réservés
        </footer>
    </div>
<script src="app.js"></script>
</body>
</html>
